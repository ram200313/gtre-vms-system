<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTRE VMS SYSTEM - System Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: var(--light-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-image: linear-gradient(135deg, #f0fdf4 0%, #e2e8f0 100%);
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 420px;
            text-align: center;
            border-top: 6px solid #10b981;
            /* Green color for general system */
        }

        .login-header h2 {
            color: var(--text-main);
            margin-bottom: 8px;
            font-size: 26px;
        }

        .login-header p {
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: var(--text-main);
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-family: inherit;
            font-size: 15px;
            box-sizing: border-box;
            transition: all 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #10b981;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }

        .error-message {
            color: var(--danger);
            font-size: 14px;
            margin-bottom: 15px;
            display: none;
            padding: 10px;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 6px;
        }

        .error-message.active {
            display: block;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            background-color: #10b981;
            border: none;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-login:hover {
            background-color: #059669;
        }

        .admin-link {
            display: inline-block;
            margin-top: 25px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 13px;
        }

        .admin-link:hover {
            color: var(--primary-blue);
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="login-container">
        <div class="login-header">
            <i class="fa-solid fa-building-user" style="font-size: 44px; color: #10b981; margin-bottom: 15px;"></i>
            <h2>GTRE VMS SYSTEM</h2>
            <p>Please log in to access the Visitor Management System.</p>
        </div>

        <div id="errorMsg" class="error-message">Invalid Username or Password.</div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">User ID</label>
                <input type="text" id="username" required placeholder="Enter User ID" autocomplete="username">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="••••••••" autocomplete="current-password">
            </div>

            <button type="submit" class="btn btn-login">
                <i class="fa-solid fa-sign-in-alt"></i> Login to System
            </button>
        </form>

        <div style="margin-top: 20px; font-size: 12px; color: #64748b;">
            <p>Demo Credentials: <b>user / GTRE123</b></p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const btn = e.target.querySelector('button');
            const errorMsg = document.getElementById('errorMsg');

            btn.disabled = true;
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Authenticating...`;
            errorMsg.classList.remove('active');

            const payload = {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            };

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    const data = await res.json();
                    if (data.status === 'success') {
                        // Store the system token securely
                        sessionStorage.setItem('systemToken', data.token);
                        sessionStorage.setItem('systemRole', data.role);

                        // Redirect to the dashboard
                        window.location.href = 'dashboard.html';
                    }
                } else {
                    errorMsg.textContent = "Invalid User ID or Password.";
                    errorMsg.classList.add('active');
                }
            } catch (err) {
                console.error(err);
                // Offline fallback mock evaluation
                if (payload.password === "GTRE123" && (payload.username === "user" || payload.username === "admin")) {
                    sessionStorage.setItem('systemToken', "mock-offline-token");
                    window.location.href = 'dashboard.html';
                } else {
                    errorMsg.textContent = "Network error or Invalid Credentials.";
                    errorMsg.classList.add('active');
                }
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<i class="fa-solid fa-sign-in-alt"></i> Login to System`;
            }
        });

        window.addEventListener('DOMContentLoaded', () => {
            if (sessionStorage.getItem('systemToken')) {
                window.location.href = 'dashboard.html';
            }
        });
    </script>
</body>

</html>
